<script>
const K="cmoreads_pw";
function b(x){const s=atob(x),a=new Uint8Array(s.length);for(let i=0;i<s.length;i++)a[i]=s.charCodeAt(i);return a;}
async function dk(p,s,it){const e=new TextEncoder();const bk=await crypto.subtle.importKey("raw",e.encode(p),"PBKDF2",false,["deriveKey"]);
 return crypto.subtle.deriveKey({name:"PBKDF2",salt:s,iterations:it,hash:"SHA-256"},bk,{name:"AES-GCM",length:256},false,["decrypt"]);}
async function dec(p){const o=JSON.parse(document.getElementById("pl").textContent);
 const key=await dk(p,b(o.salt),o.iterations);
 const pt=await crypto.subtle.decrypt({name:"AES-GCM",iv:b(o.iv)},key,b(o.ciphertext));return new TextDecoder().decode(pt);}
function render(h){document.open();document.write(h);document.close();}
async function go(e){e.preventDefault();const i=document.getElementById("gi"),er=document.getElementById("ge");er.textContent="";
 try{const h=await dec(i.value);try{localStorage.setItem(K,i.value);}catch(_){}render(h);}
 catch(_){er.textContent="wrong password";i.value="";i.focus();}return false;}
(async()=>{try{const c=localStorage.getItem(K);if(c){render(await dec(c));}}catch(_){try{localStorage.removeItem(K);}catch(_){}}})();
</script></body></html>
